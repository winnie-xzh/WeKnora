# MCP Gateway — 后端服务配置
#
# 定义各业务系统（Java、.NET 等）的 REST API 端点和工具映射。
# 密钥通过 ${VAR:-default} 环境变量引用，不写入本文件。
#
# 修改后重启网关生效。

gateway:
  name: "mcp-gateway"
  version: "1.0.0"
  request_timeout: 30  # 默认请求超时（秒）

services:
  # ── 农产品报价系统（Java） ──────────────────────────────────────
  - name: "pricing"
    display_name: "农产品报价系统"
    description: "农产品市场行情查询系统 (Java)"
    base_url: "${PRICING_SERVICE_URL:-http://WeKnora-mock-pricing:8080}"
    timeout: 30
    auth:
      type: api_key
      key: "X-API-Key"
      value: "${PRICING_API_KEY:-}"
    tools:
      - name: "get_quote"
        description: "查询指定农产品的当前报价"
        method: GET
        path: "/api/quotes/{product}"
        parameters:
          - name: "product"
            type: "string"
            description: "农产品名称，如 苹果、白菜、猪肉"
            required: true
            in: path
          - name: "market"
            type: "string"
            description: "市场名称，如 北京新发地、上海江桥"
            required: false
            in: query
          - name: "date"
            type: "string"
            description: "报价日期，格式 YYYY-MM-DD（默认当天）"
            required: false
            in: query

      - name: "get_price_history"
        description: "查询指定农产品历史价格走势"
        method: GET
        path: "/api/quotes/{product}/history"
        parameters:
          - name: "product"
            type: "string"
            description: "农产品名称，如 苹果、白菜"
            required: true
            in: path
          - name: "days"
            type: "integer"
            description: "历史天数"
            required: false
            in: query
            default: 30

      - name: "list_products"
        description: "获取农产品分类目录"
        method: GET
        path: "/api/products"
        parameters:
          - name: "category"
            type: "string"
            description: "分类，如 蔬菜、水果、肉禽"
            required: false
            in: query
          - name: "page"
            type: "integer"
            description: "页码"
            required: false
            in: query
            default: 1
          - name: "page_size"
            type: "integer"
            description: "每页条数"
            required: false
            in: query
            default: 20

  # ── 库存系统（Java） ────────────────────────────────────────────
  - name: "inventory"
    display_name: "库存管理"
    description: "仓库库存管理系统 (Java)"
    base_url: "${INVENTORY_SERVICE_URL:-http://inventory-api:8080}"
    timeout: 15
    auth:
      type: bearer
      value: "${INVENTORY_API_TOKEN:-}"
    tools:
      - name: "query_stock"
        description: "查询商品库存数量"
        method: GET
        path: "/api/stock/{sku}"
        parameters:
          - name: "sku"
            type: "string"
            description: "商品 SKU 编码"
            required: true
            in: path
          - name: "warehouse"
            type: "string"
            description: "仓库编码（不传则查询所有仓库）"
            required: false
            in: query

      - name: "search_inventory"
        description: "按条件搜索库存商品"
        method: GET
        path: "/api/stock/search"
        parameters:
          - name: "keyword"
            type: "string"
            description: "商品名称或编码关键词"
            required: true
            in: query
          - name: "category"
            type: "string"
            description: "商品分类"
            required: false
            in: query
          - name: "low_stock_only"
            type: "boolean"
            description: "仅显示低库存商品"
            required: false
            in: query
            default: false

  # ── ERP 系统（.NET） ──────────────────────────────────────────
  - name: "erp"
    display_name: "ERP 系统"
    description: "企业资源计划系统 (.NET)"
    base_url: "${ERP_SERVICE_URL:-http://erp-api:5000}"
    timeout: 30
    auth:
      type: basic
      username: "${ERP_USERNAME:-}"
      password: "${ERP_PASSWORD:-}"
    tools:
      - name: "get_order"
        description: "查询订单详情"
        method: GET
        path: "/api/orders/{order_id}"
        parameters:
          - name: "order_id"
            type: "string"
            description: "订单编号"
            required: true
            in: path

      - name: "list_orders"
        description: "按条件查询订单列表"
        method: GET
        path: "/api/orders"
        parameters:
          - name: "status"
            type: "string"
            description: "订单状态（pending/processing/shipped/completed/cancelled）"
            required: false
            in: query
          - name: "start_date"
            type: "string"
            description: "起始日期 YYYY-MM-DD"
            required: false
            in: query
          - name: "end_date"
            type: "string"
            description: "结束日期 YYYY-MM-DD"
            required: false
            in: query
          - name: "page"
            type: "integer"
            description: "页码"
            required: false
            in: query
            default: 1
          - name: "page_size"
            type: "integer"
            description: "每页条数"
            required: false
            in: query
            default: 20

      - name: "get_customer"
        description: "查询客户信息"
        method: GET
        path: "/api/customers/{customer_id}"
        parameters:
          - name: "customer_id"
            type: "string"
            description: "客户编码"
            required: true
            in: path

      - name: "list_customers"
        description: "按条件搜索客户列表"
        method: GET
        path: "/api/customers"
        parameters:
          - name: "keyword"
            type: "string"
            description: "客户名称或编码关键词"
            required: false
            in: query
          - name: "region"
            type: "string"
            description: "所属区域"
            required: false
            in: query
