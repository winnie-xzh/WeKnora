# MCP Gateway — 后端服务配置
#
# 定义各业务系统（Java、.NET 等）的 REST API 端点和工具映射。
# 密钥通过 ${VAR:-default} 环境变量引用，不写入本文件。
#
# 修改后重启网关生效。

gateway:
  name: "mcp-gateway"
  version: "1.0.0"
  request_timeout: 30  # 默认请求超时（秒）

services:
  # ── 农产品报价系统（Java） ──────────────────────────────────────
  - name: "pricing"
    display_name: "农产品报价系统"
    description: "农产品市场行情查询系统 (Java)"
    base_url: "${PRICING_SERVICE_URL:-http://WeKnora-mock-pricing:8080}"
    timeout: 30
    auth:
      type: api_key
      key: "X-API-Key"
      value: "${PRICING_API_KEY:-}"
    tools:
      - name: "get_quote"
        description: "查询指定农产品的当前报价"
        method: GET
        path: "/api/quotes/{product}"
        parameters:
          - name: "product"
            type: "string"
            description: "农产品名称，如 苹果、白菜、猪肉"
            required: true
            in: path
          - name: "market"
            type: "string"
            description: "市场名称，如 南宁海吉星、柳州海吉星、桂林五里店"
            required: false
            in: query
          - name: "date"
            type: "string"
            description: "报价日期，格式 YYYY-MM-DD（默认当天）"
            required: false
            in: query

      - name: "get_price_history"
        description: "查询指定农产品历史价格走势"
        method: GET
        path: "/api/quotes/{product}/history"
        parameters:
          - name: "product"
            type: "string"
            description: "农产品名称，如 苹果、白菜"
            required: true
            in: path
          - name: "days"
            type: "integer"
            description: "历史天数"
            required: false
            in: query
            default: 30

      - name: "list_products"
        description: "获取农产品分类目录"
        method: GET
        path: "/api/products"
        parameters:
          - name: "category"
            type: "string"
            description: "分类，如 蔬菜、水果、肉禽"
            required: false
            in: query
          - name: "page"
            type: "integer"
            description: "页码"
            required: false
            in: query
            default: 1
          - name: "page_size"
            type: "integer"
            description: "每页条数"
            required: false
            in: query
            default: 20
